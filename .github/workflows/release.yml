name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: local/go.mod

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Build in Docker (native arch)
        run: |
          docker run --rm \
            --platform linux/${{ matrix.arch }} \
            -v "$PWD":/app \
            -w /app/local \
            -e GOTOOLCHAIN=auto \
            golang:1.24rc2 \
            sh -c "
              apt-get update && apt-get install -y gcc libc-dev &&
              go build -buildvcs=false -ldflags='-s -w' -o ../startnetwork-linux-${{ matrix.arch }} ./cmd/startnetwork &&
              go build -buildvcs=false -ldflags='-s -w' -o ../bombard-linux-${{ matrix.arch }} ./cmd/bombard
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries-linux-${{ matrix.arch }}
          path: |
            startnetwork-linux-${{ matrix.arch }}
            bombard-linux-${{ matrix.arch }}

  build-darwin:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: local/go.mod

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        working-directory: local
        run: |
          go build -ldflags="-s -w" -o ../startnetwork-darwin-${{ matrix.arch }} ./cmd/startnetwork
          go build -ldflags="-s -w" -o ../bombard-darwin-${{ matrix.arch }} ./cmd/bombard

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries-darwin-${{ matrix.arch }}
          path: |
            startnetwork-darwin-${{ matrix.arch }}
            bombard-darwin-${{ matrix.arch }}

  release:
    name: Create Release
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          for dir in artifacts/binaries-*; do
            suffix=$(basename "$dir" | sed 's/binaries-//')

            # Create directory for this platform
            mkdir -p "release/local-benchmark-$suffix"
            cp "$dir"/* "release/local-benchmark-$suffix/"
            cp local/README.md "release/local-benchmark-$suffix/" 2>/dev/null || true
            cp -r local/staking "release/local-benchmark-$suffix/" 2>/dev/null || true

            # Rename binaries
            mv "release/local-benchmark-$suffix/startnetwork-$suffix" "release/local-benchmark-$suffix/startnetwork"
            mv "release/local-benchmark-$suffix/bombard-$suffix" "release/local-benchmark-$suffix/bombard"
            chmod +x "release/local-benchmark-$suffix/startnetwork" "release/local-benchmark-$suffix/bombard"

            # Create tarball
            cd release
            tar -czf "local-benchmark-$suffix.tar.gz" "local-benchmark-$suffix"
            cd ..
          done

          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
